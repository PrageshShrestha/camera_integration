<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
        }
        .controls p {
            margin: 5px 0;
            font-size: 12px;
            opacity: 0.8;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading 3D Model...</div>
    
    <div class="controls">
        <h3>3D Model Controls</h3>
        <p><strong>Mouse:</strong> Left click + drag to rotate</p>
        <p><strong>Mouse:</strong> Right click + drag to pan</p>
        <p><strong>Mouse:</strong> Scroll to zoom in/out</p>
        <p><strong>Touch:</strong> One finger + drag to rotate</p>
        <p><strong>Touch:</strong> Two fingers to zoom</p>
        <p id="modelInfo">Model: Loading...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let model;

        // Scene setup
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Add orbit controls for interactivity
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.enableRotate = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-5, 3, -5);
            scene.add(pointLight);

            // Load the 3D model
            loadModel();
        }

        function loadModel() {
            const loader = new THREE.OBJLoader();
            
            loader.load('/static/models/model.obj', 
                function (object) {
                    // Center the model
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());
                    object.position.sub(center);
                    
                    // Scale the model appropriately
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2.0 / maxDim;
                    object.scale.multiplyScalar(scale);
                    
                    // Add material with better appearance
                    object.traverse(function(child) {
                        if (child instanceof THREE.Mesh) {
                            child.material = new THREE.MeshPhongMaterial({
                                color: 0x00ff88,
                                specular: 0x111111,
                                shininess: 100,
                                side: THREE.DoubleSide
                            });
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    scene.add(object);
                    model = object;
                    
                    // Update UI
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('modelInfo').textContent = `Model: Loaded (${object.children.length} objects)`;
                    
                    // Adjust camera to fit model
                    controls.target.set(0, 0, 0);
                    controls.update();
                },
                function (progress) {
                    console.log('Loading progress:', (progress.loaded / progress.total * 100) + '%');
                },
                function (error) {
                    console.error('Error loading model:', error);
                    document.getElementById('loading').textContent = 'Error loading model';
                    document.getElementById('modelInfo').textContent = 'Model: Failed to load';
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Update controls
            if (controls) {
                controls.update();
            }
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize and start
        init();
        animate();

        // Event listeners
        window.addEventListener('resize', onWindowResize);

        // Keyboard controls
        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'r':
                controls.autoRotate = !controls.autoRotate;
                    break;
                case 'f':
                    // Reset camera
                    camera.position.set(0, 0, 5);
                    controls.target.set(0, 0, 0);
                    controls.update();
                    break;
            }
        });
    </script>
</body>
</html>
